<!DOCTYPE html>
<html lang="fr" id="htmlRoot">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu | Restaurant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'" />
    <link rel="preload" as="style" href="vendor/bootstrap-icons/bootstrap-icons.min.css?v=2" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css?v=2"></noscript>
    <link rel="preload" as="font" href="vendor/bootstrap-icons/fonts/bootstrap-icons.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="image" href="images/hero-premium-menu-960.webp"
        imagesrcset="images/hero-premium-menu-640.webp 640w, images/hero-premium-menu-960.webp 960w, images/hero-premium-menu-1440.webp 1440w"
        imagesizes="100vw" fetchpriority="high">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
        }

        body.menu-page {
            background: #0d0f14;
            color: #f6f1ea;
            font-family: 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }

        .mobile-wrapper {
            min-height: 100vh;
        }

        .top-nav-bar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(100%, 500px);
            z-index: 1500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: calc(env(safe-area-inset-top, 0px) + 14px) 20px 18px;
        }

        .top-nav-left,
        .top-nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.92);
        }

        .nav-cart-btn {
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            background: #fff;
            color: #e63946;
            font-weight: 800;
            font-size: 0.7rem;
            border: 2px solid #e63946;
        }

        #landingView {
            padding-top: 72px;
        }

        .landing-hero {
            position: relative;
            overflow: hidden;
            height: 60vh;
            min-height: 440px;
            max-height: 60vh;
        }

        .landing-hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
    <link rel="preload" as="style" href="menu-shell.css?v=2" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="menu-shell.css?v=2"></noscript>
    <link rel="preload" as="style" href="menu-page.css?v=2" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="menu-page.css?v=2"></noscript>
    <link rel="preload" as="style" href="laruche.css?v=2" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="laruche.css?v=2"></noscript>
</head>


<body class="menu-page" data-homepage-polish="v2">

    <div class="mobile-wrapper is-landing">

        <!-- ═══════════ LANDING PAGE VIEW ═══════════ -->
        <div id="landingView">
            <!-- Top Nav on Landing -->
            <nav class="top-nav-bar">
                <div class="top-nav-left">
                    <!-- Language Dropdown -->
                    <div class="lang-dropdown" id="langDropdown">
                        <button class="lang-drop-btn" onclick="toggleLangDropdown()">
                            <span id="currentLangDisplay">FR</span>
                            <span class="chevron">&#9662;</span>
                        </button>
                        <div class="lang-options" id="langOptions">
                            <div class="lang-opt" onclick="window.setLang('fr', this)">FR</div>
                            <div class="lang-opt" onclick="window.setLang('en', this)">EN</div>
                            <div class="lang-opt" onclick="window.setLang('ar', this)">AR</div>
                        </div>
                    </div>
                </div>
                <div class="top-nav-right">
                    <button id="cartNavBtnLanding" class="nav-icon-btn nav-cart-btn" onclick="openDrawer()"
                        data-i18n-title="confirm_cart_label" data-i18n-aria-label="confirm_cart_label" title="Panier" aria-label="Panier">
                        <i class="bi bi-bag-check-fill" aria-hidden="true"></i> <span id="cartBadgeLanding" class="cart-badge">0</span>
                    </button>
                    <button class="nav-icon-btn landing-game-shortcut" onclick="openGameModal()" data-i18n-title="game_title" data-i18n-aria-label="game_title" title="Jeu" aria-label="Jeu">
                        <i class="bi bi-controller" aria-hidden="true"></i>
                    </button>
                    <button class="nav-icon-btn" onclick="openHistory()" data-i18n-title="history_button_title" data-i18n-aria-label="history_button_title" title="Historique" aria-label="Historique">
                        <i class="bi bi-clock-history" aria-hidden="true"></i> <span id="histBadgeLanding" class="history-badge">0</span>
                    </button>
                    <a href="index.html" class="nav-icon-btn close-btn"
                        data-i18n-title="landing_home_title" data-i18n-aria-label="landing_home_title"
                        title="Accueil" aria-label="Accueil"><i class="bi bi-house-door-fill" aria-hidden="true"></i></a>
                </div>
            </nav>

            <!-- Hero Image -->
            <div class="landing-hero h-[-webkit-fill-available] min-h-[440px] max-h-[60vh] relative overflow-hidden">
                <picture>
                    <source type="image/webp"
                        srcset="images/hero-premium-menu-640.webp 640w, images/hero-premium-menu-960.webp 960w, images/hero-premium-menu-1440.webp 1440w"
                        sizes="100vw">
                    <img src="images/hero-premium-menu.png" alt="Image principale du restaurant" data-i18n-alt="image_alt_hero" class="landing-hero-img w-full h-full object-cover" id="landingHeroImage" width="1440" height="900" decoding="async" fetchpriority="high" loading="eager">
                </picture>
                <div class="landing-hero-overlay absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/80"></div>
            </div>

            <!-- Logo Overlap -->
            <div class="landing-logo-wrap menu-reveal-observe">
                <div class="landing-logo-circle">
                    <img src="" alt="Logo du restaurant" data-i18n-alt="image_alt_logo" class="landing-logo-img" id="landingLogoImage" width="256" height="256" style="display:none;" decoding="async" fetchpriority="high">
                    <div class="landing-logo-fallback" id="landingLogoFallback">&#127829;</div>
                </div>
            </div>

            <!-- Restaurant Info -->
            <div class="landing-body">
                <h1 class="landing-rest-name menu-reveal-observe" id="landingRestaurantName">Pizzeria Nour</h1>
                <p class="landing-subtitle menu-reveal-observe" id="landingSubtitle" data-i18n="menu_landing_subtitle">Carte du jour, pr&ecirc;te &agrave; parcourir.</p>
                <div class="landing-meta-row menu-reveal-observe" id="landingMetaRow">
                    <span class="landing-meta-pill" id="landingMetaItems">0 plats</span>
                    <span class="landing-meta-pill" id="landingMetaCategories">0 cat&eacute;gories</span>
                    <span class="landing-meta-pill" id="landingMetaFeatured">0 signature</span>
                </div>
                <div id="statusBadge" class="status-badge landing-status menu-reveal-observe">
                    <span class="dot"></span> <span id="statusText" data-i18n="status_loading">Chargement...</span>
                </div>

                <!-- View Menu Button -->
                <button class="view-menu-btn menu-reveal-observe" onclick="openSuperCatSheet()">
                    <span class="view-menu-btn-icon" aria-hidden="true"><i class="bi bi-grid-3x3-gap-fill"></i></span>
                    <span data-i18n="view_menu">Voir le Menu</span>
                </button>

                <div id="featuredLanding" class="featured-section featured-section--landing menu-reveal-observe" data-state="loading"></div>

                <!-- Info Rows -->
                <div class="info-section grid grid-cols-2 gap-3 mb-8 px-4">
                    <div class="info-row is-actionable group flex flex-col items-center justify-center p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300" data-i18n-title="landing_map_title" title="Voir sur la carte">
                        <span class="info-label" data-i18n="landing_map_title">Carte</span>
                        <span class="info-icon text-2xl mb-1 group-hover:scale-110 transition-transform" aria-hidden="true"><i class="bi bi-geo-alt-fill"></i></span>
                        <span class="info-text text-[0.7rem] uppercase font-bold tracking-wider opacity-60" id="landingLocation"></span>
                    </div>
                    <div class="info-row is-actionable group flex flex-col items-center justify-center p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300" data-i18n-title="landing_call_title" title="Appeler">
                        <span class="info-label" data-i18n="landing_call_title">Appel</span>
                        <span class="info-icon text-2xl mb-1 group-hover:scale-110 transition-transform" aria-hidden="true"><i class="bi bi-telephone-fill"></i></span>
                        <span class="info-text text-[0.7rem] uppercase font-bold tracking-wider opacity-60" id="landingPhone"></span>
                    </div>
                    <div class="info-row is-actionable group flex flex-col items-center justify-center p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300" data-i18n-title="landing_social_title" title="Nos reseaux sociaux">
                        <span class="info-label" data-i18n="landing_social_title">Réseaux</span>
                        <span class="info-icon text-2xl mb-1 group-hover:scale-110 transition-transform" aria-hidden="true"><i class="bi bi-share-fill"></i></span>
                        <span class="info-text text-[0.7rem] uppercase font-bold tracking-wider opacity-60" id="landingSocial"></span>
                    </div>
                    <div class="info-row is-actionable group flex flex-col items-center justify-center p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300" data-i18n-title="landing_wifi_title" title="Code WiFi">
                        <span class="info-label" data-i18n="landing_wifi_title">WiFi</span>
                        <span class="info-icon text-2xl mb-1 group-hover:scale-110 transition-transform" aria-hidden="true"><i class="bi bi-wifi"></i></span>
                        <span class="info-text text-[0.7rem] uppercase font-bold tracking-wider opacity-60" id="landingWifi"></span>
                    </div>
                </div>

                <!-- Social Links -->
                <div class="social-links social-links-minimal menu-reveal-observe" id="menuLandingSocialLinks">
                    <a href="index.html" class="social-icon-link" data-i18n-title="landing_home_title" data-i18n-aria-label="landing_home_title" title="Accueil" aria-label="Accueil">&#127968;</a>
                </div>
            </div>
        </div>
        <!-- END LANDING VIEW -->

        <!-- ═══════════ MENU NAVIGATION VIEW ═══════════ -->
        <div id="menuNavigationView" style="display:none;">
            <!-- Top Nav for Menu -->
            <nav class="top-nav-bar menu-nav-bar">
                <div class="top-nav-left">
                    <button id="menuBackBtn" class="nav-icon-btn" onclick="menuGoBack()"
                        data-i18n-title="nav_back" data-i18n-aria-label="nav_back" title="Retour" aria-label="Retour"
                        style="display:none;"><i class="bi bi-arrow-left"></i></button>
                    <div class="nav-breadcrumb" id="navBreadcrumb"></div>
                </div>
                <div class="top-nav-right">
                    <button id="cartNavBtnMenu" class="nav-icon-btn nav-cart-btn" onclick="openDrawer()"
                        data-i18n-title="confirm_cart_label" data-i18n-aria-label="confirm_cart_label" title="Panier" aria-label="Panier">
                        <i class="bi bi-bag-check-fill" aria-hidden="true"></i> <span id="cartBadgeMenu" class="cart-badge">0</span>
                    </button>
                    <button class="nav-icon-btn menu-game-shortcut" onclick="openGameModal()" data-i18n-title="game_title" data-i18n-aria-label="game_title" title="Jeu" aria-label="Jeu">
                        <i class="bi bi-controller" aria-hidden="true"></i>
                    </button>
                    <button class="nav-icon-btn" onclick="openHistory()" data-i18n-title="history_button_title" data-i18n-aria-label="history_button_title" title="Historique" aria-label="Historique">
                        <i class="bi bi-clock-history" aria-hidden="true"></i> <span id="histBadgeMenu" class="history-badge">0</span>
                    </button>
                    <button class="nav-icon-btn" onclick="showLanding()" data-i18n-title="landing_home_title" data-i18n-aria-label="landing_home_title" title="Accueil" aria-label="Accueil"><i class="bi bi-house-door-fill"></i></button>
                </div>
            </nav>

            <!-- Hero banner in menu -->
            <div class="menu-nav-hero">
                <img src="images/hero-default.svg" alt="Image principale du restaurant" data-i18n-alt="image_alt_hero" class="menu-nav-hero-img" id="menuHeroImage" width="1440" height="900" decoding="async" fetchpriority="low">
                <div class="menu-nav-hero-overlay"></div>
                <div class="menu-nav-hero-title menu-reveal-observe" id="menuNavTitle" data-i18n="nav_menu">Menu</div>
            </div>

            <!-- Content Area -->
            <div class="menu-content-area menu-reveal-observe">
                <!-- Sub-category grid -->
                <div id="catNavWrapper" class="cat-nav-wrapper menu-reveal-observe" style="display:none;">
                    <h2 id="subCatTitle" class="menu-section-title subcat-title">
                    </h2>
                    <div id="catNavScroll" class="cat-nav-scroll">
                        <!-- Categories injected here -->
                    </div>
                </div>

                <!-- Menu Items -->
                <div id="menuContent" style="display:none;">
                    <!-- Menu items injected here -->
                </div>
            </div>
        </div>
        <!-- END MENU NAVIGATION VIEW -->

        <!-- GLOBAL UI ELEMENTS -->
        <!-- Global Home Bubble -->
        <div class="home-floating-hub" onclick="showLanding()">
            <i class="bi bi-house-heart-fill" aria-hidden="true"></i>
        </div>

    </div>

    <!-- SUPER CATEGORY BOTTOM SHEET -->
    <div id="superCatOverlay" class="overlay" onclick="closeSuperCatSheet()"></div>
    <div id="superCatSheet" class="super-cat-sheet">
        <button class="super-sheet-close" onclick="closeSuperCatSheet()" data-i18n-title="modal_close" data-i18n-aria-label="modal_close" title="Fermer" aria-label="Fermer"><i class="bi bi-x-lg"></i></button>
        <h2 class="super-sheet-title" data-i18n="menu_select_title">S&eacute;lectionner un Menu</h2>
        <div id="superCatList">
            <!-- Injected by JS -->
        </div>
    </div>

    <!-- Deferred interaction overlays mount on demand -->


    <script src="shared-public.js?v=2" defer></script>
    <script src="menu.js?v=2" defer></script>
</body>

</html>
